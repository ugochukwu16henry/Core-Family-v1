<div class="shell">
  <header class="nav-wrap">
    <div class="page-shell nav card">
      <a routerLink="/" class="brand">
        <span class="brand-mark">CF</span>
        <span>
          <strong>Core Family</strong>
          <small>Marriage and family growth platform</small>
        </span>
      </a>

      <nav class="nav-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/programs" routerLinkActive="active">Programs</a>
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/my-learning" routerLinkActive="active" *ngIf="user()">My Learning</a>
        <a routerLink="/auth/login" routerLinkActive="active" *ngIf="!user()">Login</a>
      </nav>

      <div class="nav-actions">
        <a class="button-ghost" routerLink="/auth/register" *ngIf="!user()">Register</a>
        <a class="button-primary" [routerLink]="user() ? '/dashboard' : '/auth/register'">{{ ctaLabel() }}</a>
        <button class="button-secondary" type="button" (click)="logout()" *ngIf="user()">Sign out</button>
      </div>
    </div>
  </header>

  <main>
    <router-outlet />
  </main>

  <footer class="footer page-shell">
    <div>
      <h3>Strong homes need structured support.</h3>
      <p>Courses, counseling, and accountability designed for singles, couples, and families.</p>
    </div>
    <div>
      <span>Core Family</span>
      <span>Built with Angular + ASP.NET Core</span>
    </div>
  </footer>
</div>
