<div class="auth-card-header">
  <span class="eyebrow">Welcome back</span>
  <h2>Sign in to continue your growth plan.</h2>
  <p>Access your courses, profile, and upcoming counseling sessions.</p>
</div>

<form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
  <div class="status-banner error" *ngIf="errorMessage()">{{ errorMessage() }}</div>

  <div class="field">
    <label for="login-email">Email</label>
    <input id="login-email" type="email" formControlName="email" placeholder="you@example.com" />
    <span class="error-text" *ngIf="form.controls.email.touched && form.controls.email.invalid">Enter a valid email address.</span>
  </div>

  <div class="field">
    <label for="login-password">Password</label>
    <input id="login-password" type="password" formControlName="password" placeholder="Your password" />
    <span class="error-text" *ngIf="form.controls.password.touched && form.controls.password.invalid">Password is required.</span>
  </div>

  <button class="button-primary submit-button" type="submit" [disabled]="isSubmitting()">
    {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}
  </button>
</form>

<p class="auth-switch">New here? <a routerLink="/auth/register">Create your account</a>.</p>
