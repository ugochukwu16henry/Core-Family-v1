<div class="admin-users">
  <h2>User Management</h2>
  <div *ngIf="loading">Loading users...</div>
  <div *ngIf="error">{{ error }}</div>
  <table *ngIf="!loading && users.length">
    <thead>
      <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Roles</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.userName }}</td>
        <td>{{ user.email }}</td>
        <td>
          <span *ngFor="let role of user.roles" class="role-chip">
            {{ role }}
            <button (click)="removeRole(user, role)" title="Remove role" class="remove-role">&times;</button>
          </span>
        </td>
        <td>
          <select #roleSelect>
            <option *ngFor="let role of getAssignableRoles(user)" [value]="role">{{ role }}</option>
          </select>
          <button (click)="assignRole(user, roleSelect.value)" [disabled]="getAssignableRoles(user).length === 0">Add Role</button>
        </td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="!loading && !users.length">No users found.</div>
</div>
