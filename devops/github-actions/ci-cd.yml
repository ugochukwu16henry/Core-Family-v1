name: Core Family — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20.x"

jobs:
  # ── Backend API ──────────────────────────────────────────────────
  api-build-test:
    name: API — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/CoreFamily.API
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run tests
        run: dotnet test --no-build -c Release --verbosity normal

  # ── Angular Frontend ─────────────────────────────────────────────
  frontend-build-test:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

      - name: Run tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless

  # ── Blazor Admin ─────────────────────────────────────────────────
  admin-build:
    name: Admin — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard/CoreFamily.Admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Build
        run: dotnet build -c Release

  # ── Deploy to Staging (develop branch only) ──────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [api-build-test, frontend-build-test, admin-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Azure (staging)
        run: echo "TODO — configure Azure App Service deployment here"
        # Replace with: az webapp deploy or Docker push to ACR

  # ── Deploy to Production (main branch only) ──────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [api-build-test, frontend-build-test, admin-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Azure (production)
        run: echo "TODO — configure Azure App Service production deployment here"
